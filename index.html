<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#0a0e1a">
<title>SKD編集</title>
<style>
:root {
  --bg:#0a0e1a; --bg2:#111827; --bg3:#1a2235;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text:#e8edf5; --text2:#8a9bb5; --text3:#4a5a72;
  --blue:#4a9eff; --blue-dim:rgba(74,158,255,0.12);
  --green:#34c78a; --green-dim:rgba(52,199,138,0.12);
  --amber:#f5a623; --amber-dim:rgba(245,166,35,0.12);
  --radius:14px; --radius-sm:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Hiragino Sans','Yu Gothic UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.app-header{position:sticky;top:0;z-index:100;background:rgba(10,14,26,0.9);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.header-inner{display:flex;align-items:center;gap:12px;padding:14px 20px}
.header-icon{width:36px;height:36px;background:var(--blue-dim);border:1px solid rgba(74,158,255,0.25);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.header-text{flex:1}
.header-title{font-size:17px;font-weight:700}
.header-sub{font-size:11px;color:var(--text2);margin-top:1px}
.header-btn{background:var(--bg3);color:var(--text);border:1px solid var(--border2);padding:7px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer}
.config-panel{background:var(--bg2);border:1px solid var(--border2);padding:16px;margin:12px 16px;border-radius:var(--radius);display:none}
.config-panel.show{display:block}
.config-title{font-size:13px;font-weight:bold;margin-bottom:12px;color:var(--blue)}
.config-field{margin-bottom:10px}
.config-field label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px}
.config-field input{width:100%;background:var(--bg3);border:1px solid var(--border2);padding:8px;border-radius:6px;color:var(--text);font-size:13px;outline:none}
.tabs-wrap{display:flex;gap:6px;padding:10px 20px;overflow-x:auto}
.tab{padding:6px 14px;font-size:12px;font-weight:600;color:var(--text2);background:transparent;border:1px solid var(--border);border-radius:100px;cursor:pointer;white-space:nowrap}
.tab.active{color:var(--bg);background:var(--text);border-color:var(--text)}
.action-section{padding:12px 16px 4px;max-width:640px;margin:0 auto}
.date-range-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;margin-bottom:8px;cursor:pointer;user-select:none}
.date-range-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.date-range-display{display:flex;align-items:center;gap:8px;justify-content:space-between}
.date-range-val{font-size:14px;font-weight:600;color:var(--text);font-family:'Courier New',monospace}
.date-range-sep{color:var(--text3)}
.date-reset-btn{background:transparent;border:1px solid var(--border);color:var(--text2);font-size:11px;padding:4px 10px;border-radius:100px;cursor:pointer}
.date-range-hint{font-size:11px;color:var(--blue);margin-top:4px}

/* カスタムカレンダー */
#cal-popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:500;background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:16px;width:min(340px,92vw);box-shadow:0 16px 48px rgba(0,0,0,.7)}
#cal-popup.show{display:block}
#cal-overlay{display:none;position:fixed;inset:0;z-index:499;background:rgba(0,0,0,.5)}
#cal-overlay.show{display:block}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-title{font-size:15px;font-weight:700;color:var(--text)}
.cal-nav{background:transparent;border:1px solid var(--border);color:var(--text2);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.cal-nav:hover{background:var(--bg3)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dow{font-size:10px;font-weight:700;color:var(--text3);text-align:center;padding:4px 0;text-transform:uppercase}
.cal-day{font-size:13px;font-weight:500;color:var(--text2);text-align:center;padding:7px 4px;border-radius:8px;cursor:pointer;transition:all .12s}
.cal-day:hover{background:var(--bg3);color:var(--text)}
.cal-day.today{color:var(--blue);font-weight:700}
.cal-day.in-range{background:rgba(74,158,255,0.12);color:var(--text);border-radius:0}
.cal-day.range-start,.cal-day.range-end{background:var(--blue);color:#000;font-weight:700;border-radius:8px}
.cal-day.range-start{border-radius:8px 0 0 8px}
.cal-day.range-end{border-radius:0 8px 8px 0}
.cal-day.range-start.range-end{border-radius:8px}
.cal-day.other-month{color:var(--text3)}
.cal-day.disabled{opacity:.3;cursor:default;pointer-events:none}
.cal-hint{font-size:11px;color:var(--text2);text-align:center;margin-top:10px}
.cal-actions{display:flex;gap:8px;margin-top:12px}
.cal-btn{flex:1;padding:9px;font-size:13px;font-weight:700;border-radius:var(--radius-sm);cursor:pointer;border:none}
.cal-btn-ok{background:var(--blue);color:#000}
.cal-btn-cancel{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.sync-btn{width:100%;background:var(--blue-dim);color:var(--blue);border:1px solid rgba(74,158,255,0.4);padding:12px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
main{padding:12px 16px 100px;max-width:640px;margin:0 auto}
.ev-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
.ev-card.has-alert{border-color:rgba(74,158,255,0.2)}
.ev-header{display:flex;align-items:center;gap:10px;padding:13px 16px}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:100px;flex-shrink:0}
.b-stay{background:var(--green-dim);color:var(--green);border:1px solid rgba(52,199,138,0.25)}
.b-fly{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(74,158,255,0.25)}
.b-other{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.ev-date-left{font-size:20px;font-weight:700;color:var(--text);font-family:'Courier New',monospace;flex-shrink:0}
.ev-name{font-size:13px;font-weight:600;flex:none;text-align:right;max-width:50%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chev{font-size:14px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.chev.open{transform:rotate(180deg)}
.ev-body{display:none;padding:0 16px 16px;border-top:1px solid var(--border)}
.ev-body.open{display:block}
.sec-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;margin:12px 0 8px}
.timeline{padding-left:20px;position:relative}
.timeline::before{content:'';position:absolute;left:6px;top:4px;bottom:4px;width:1px;background:var(--border)}
.tl-item{position:relative;margin-bottom:9px;font-size:12px;color:var(--text2);display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.tl-item::before{content:'';position:absolute;left:-15px;top:5px;width:6px;height:6px;border-radius:50%;background:var(--border2)}
.tl-item.fl::before{background:var(--blue)}
.tl-item.stay-item::before{background:var(--green)}
.tl-time{font-family:'Courier New',monospace;font-size:11px;color:var(--text);font-weight:600}
.role-tag{font-size:10px;padding:1px 5px;border-radius:4px;font-weight:700}
.role-fo{background:rgba(74,158,255,.15);color:var(--blue)}
.role-dh{background:rgba(138,155,181,.12);color:var(--text2)}
.after-stay-tag{font-size:10px;font-weight:700;background:rgba(245,166,35,0.15);color:var(--amber);border:1px solid rgba(245,166,35,0.25);padding:1px 6px;border-radius:100px}
.dep-box{background:var(--green-dim);border:1px solid rgba(52,199,138,0.2);border-radius:var(--radius-sm);padding:11px 14px;margin-top:10px}
.dep-box-label{font-size:10px;color:var(--green);font-weight:700;margin-bottom:4px}
.dep-flight{font-size:15px;font-weight:700;color:var(--text);font-family:'Courier New',monospace}
.dep-sub{font-size:11px;color:rgba(52,199,138,.7);margin-top:2px}
.alert-box{background:rgba(10,14,26,0.6);border:1px solid rgba(74,158,255,0.2);border-radius:var(--radius-sm);padding:11px 14px;margin-top:8px}
.alert-box-title{font-size:10px;font-weight:700;color:var(--blue);margin-bottom:8px}
.alert-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--border);font-size:12px}
.alert-row:last-child{border-bottom:none}
.alert-lbl{color:var(--text2)}
.alert-val{font-family:'Courier New',monospace;font-size:11px;color:var(--text);font-weight:600;text-align:right}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0 2px}
.summary-label{font-size:10px;font-weight:700;color:var(--text2)}
.summary-value{font-size:14px;font-weight:700;color:var(--amber);font-family:'Courier New',monospace;letter-spacing:1px}
.reg-btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;margin-top:10px;padding:11px 16px;font-size:13px;font-weight:700;color:var(--blue);background:var(--blue-dim);border:1px solid rgba(74,158,255,0.3);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s}
.reg-btn.done{color:var(--green);background:var(--green-dim);border-color:rgba(52,199,138,0.3)}
.card-checkbox{width:20px;height:20px;accent-color:var(--blue);cursor:pointer;flex-shrink:0}
#bulk-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:none;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--border2);border-radius:100px;padding:10px 16px 10px 20px;box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:200;white-space:nowrap}
#bulk-bar.show{display:flex}
#bulk-bar-count{font-size:13px;font-weight:700;color:var(--text2)}
#bulk-bar-btn{padding:8px 18px;font-size:13px;font-weight:700;color:var(--bg);background:linear-gradient(135deg,var(--blue),var(--green));border:none;border-radius:100px;cursor:pointer}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1e2d45;color:var(--text);font-size:13px;font-weight:600;padding:10px 20px;border-radius:100px;border:1px solid rgba(74,158,255,0.3);z-index:9999;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;max-width:calc(100vw - 40px);overflow:hidden;text-overflow:ellipsis;box-shadow:0 8px 32px rgba(0,0,0,.5)}
#toast.show{opacity:1}
.empty{text-align:center;color:var(--text2);font-size:14px;padding:3rem 1rem}
.offleave-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.offleave-item:last-child{border-bottom:none}
.offleave-item input{width:18px;height:18px;accent-color:var(--green);flex-shrink:0}
.offleave-date{font-family:'Courier New',monospace;font-weight:700;color:var(--text);min-width:50px}
.offleave-title{flex:1;color:var(--text2)}
.offleave-badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:100px;background:var(--green-dim);color:var(--green)}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-inner">
    <div class="header-icon">✈</div>
    <div class="header-text">
      <div class="header-title">SKD編集</div>
      <div class="header-sub" id="auth-status">設定してください</div>
    </div>
    <button class="header-btn" onclick="toggleConfig()">⚙ 設定</button>
  </div>
  <div class="tabs-wrap">
    <button class="tab" onclick="setTab('all',this)">すべて</button>
    <button class="tab active" onclick="setTab('stay',this)">🛏 ステイあり</button>
  </div>
</header>

<div id="config-panel" class="config-panel">
  <div class="config-title">⚙ Google API 設定</div>
  <div class="config-field">
    <label>Google API Key</label>
    <input type="password" id="cfg-api-key" placeholder="AIzaSy...">
  </div>
  <div class="config-field">
    <label>OAuth クライアント ID</label>
    <input type="text" id="cfg-client-id" placeholder="xxxx.apps.googleusercontent.com">
  </div>
  <div class="config-field">
    <label>フライトカレンダー名（例：2フライト）</label>
    <input type="text" id="cfg-src-cal" placeholder="2フライト">
  </div>
  <button onclick="saveConfig()" style="width:100%;padding:10px;background:var(--blue);color:#000;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;margin-top:4px">保存</button>
</div>

<div class="action-section">
  <div class="date-range-wrap" onclick="openCal()">
    <div class="date-range-label">取得期間（タップして変更）</div>
    <div class="date-range-display">
      <span class="date-range-val" id="range-display">-- / -- 〜 -- / --</span>
      <button class="date-reset-btn" onclick="event.stopPropagation();resetDateRange()">リセット</button>
    </div>
  </div>
  <button class="sync-btn" onclick="startSync()">🔄 18-8時間前・P/U時刻作成</button>
  <button class="sync-btn" id="offleave-btn" onclick="startOffLeaveMigration()" style="margin-top:8px;background:var(--green-dim);color:var(--green);border-color:rgba(52,199,138,0.4)">
    🏖 OFF・leave予定を「1休日」へ移動
  </button>
  <div style="display:flex;gap:8px;margin-top:8px">
    <button class="sync-btn" id="fixallday-btn" onclick="startFixAllDay()" style="flex:1;margin-top:0;background:var(--amber-dim);color:var(--amber);border-color:rgba(245,166,35,0.4);font-size:13px;padding:11px 8px">
      🛠 休日・STBYを終日に修正
    </button>
    <button class="sync-btn" id="mergeholiday-btn" onclick="startMergeHoliday()" style="flex:1;margin-top:0;background:rgba(167,139,250,0.10);color:#a78bfa;border-color:rgba(167,139,250,0.4);font-size:13px;padding:11px 8px">
      🔗 連休を結合
    </button>
  </div>
</div>

<!-- 連続OFF/leave統合 結果 -->
<div id="merge-panel" class="config-panel" style="display:none">
  <div class="config-title" style="color:#a78bfa">🔗 統合対象一覧</div>
  <div id="merge-list"></div>
  <div class="cal-actions" style="margin-top:12px">
    <button class="cal-btn cal-btn-cancel" onclick="closeMergePanel()">キャンセル</button>
    <button class="cal-btn cal-btn-ok" id="merge-confirm-btn" onclick="confirmMergeHoliday()">この内容で統合する</button>
  </div>
</div>

<!-- OFF/leave 移動結果 -->
<div id="offleave-panel" class="config-panel" style="display:none">
  <div class="config-title" style="color:var(--green)">🏖 移動対象一覧</div>
  <div id="offleave-list"></div>
  <div class="cal-actions" style="margin-top:12px">
    <button class="cal-btn cal-btn-cancel" onclick="closeOffLeavePanel()">キャンセル</button>
    <button class="cal-btn cal-btn-ok" id="offleave-confirm-btn" onclick="confirmOffLeaveMigration()">この内容で移動する</button>
  </div>
</div>

<!-- カスタム期間カレンダー -->
<div id="cal-overlay" onclick="closeCal()"></div>
<div id="cal-popup">
  <div class="cal-header">
    <button class="cal-nav" onclick="calMove(-1)">‹</button>
    <div class="cal-title" id="cal-title"></div>
    <button class="cal-nav" onclick="calMove(1)">›</button>
  </div>
  <div class="cal-grid" id="cal-dow">
    <div class="cal-dow">日</div><div class="cal-dow">月</div><div class="cal-dow">火</div>
    <div class="cal-dow">水</div><div class="cal-dow">木</div><div class="cal-dow">金</div><div class="cal-dow">土</div>
  </div>
  <div class="cal-grid" id="cal-days"></div>
  <div class="cal-hint" id="cal-hint">開始日をタップ</div>
  <div class="cal-actions">
    <button class="cal-btn cal-btn-cancel" onclick="closeCal()">キャンセル</button>
    <button class="cal-btn cal-btn-ok" id="cal-ok" onclick="confirmCal()" disabled>決定</button>
  </div>
</div>

<main><div id="container"><div class="empty">「自動取得」ボタンを押してください</div></div></main>

<div id="toast"></div>
<div id="bulk-bar">
  <span id="bulk-bar-count">0件選択中</span>
  <button id="bulk-bar-btn" onclick="execBulkRegister()">⚡ 一括登録</button>
  <span style="cursor:pointer;color:var(--text3);padding:0 6px;font-size:18px" onclick="clearSelection()">✕</span>
</div>

<script>
/* ══ カレンダーID ══ */
const TARGET_CAL_ID = "89fihd656vdmnlgisqape2l4no@group.calendar.google.com"; // 0予定
const IDO_CAL_ID    = "ksjofkag773varmi7j1afj23k0@group.calendar.google.com";  // 3移動
const OFF_LEAVE_CAL_ID = "0l66ha2u21toujpkaui8tnu0a0@group.calendar.google.com"; // 1休日

/* ══ タイムゾーン ══ */
const TZ = {HND:9,NRT:9,ITM:9,KIX:9,FUK:9,OKA:9,CTS:9,NGO:9,SDJ:9,LAX:-7,SFO:-7,SEA:-7,JFK:-4,BOS:-4,MIA:-4,ORD:-5,DFW:-5,DEN:-6,HNL:-10,GUM:10,SIN:8,HKG:8,MNL:8,TSA:8,CAN:8,PEK:8,PVG:8,ICN:9,BKK:7,SGN:7,RGN:6,DXB:4,BOM:5,DEL:5,SYD:11,MEL:11,LHR:1,CDG:2,FRA:2,AMS:2};
function tzOff(iata){ return TZ[iata] !== undefined ? TZ[iata] : 9; }

/* ══ 状態 ══ */
let EVENTS = [];
let selectedIds = new Set();
let registered = {};
let isGapiReady = false;
let tokenClient = null;
let pendingAction = null;
let currentTab = 'stay'; // デフォルトはステイあり

/* ══ 設定 ══ */
function toggleConfig(){ document.getElementById('config-panel').classList.toggle('show'); }

window.addEventListener('load', () => {
  document.getElementById('cfg-api-key').value  = localStorage.getItem('cfg_api_key')    || '';
  document.getElementById('cfg-client-id').value = localStorage.getItem('cfg_client_id') || '';
  document.getElementById('cfg-src-cal').value   = localStorage.getItem('cfg_src_cal')   || '2フライト';
  initDateRange();
  updateAuthStatus();
});

function toDateInputVal(d){ return d.toISOString().slice(0,10); }

/* ══ 期間管理 ══ */
let rangeFrom = null, rangeTo = null;

function initDateRange(){
  const now = new Date();
  rangeFrom = new Date(now.getTime() - 2*24*3600*1000);
  rangeTo   = new Date(now.getTime() + 90*24*3600*1000);
  updateRangeDisplay();
}
function resetDateRange(){ initDateRange(); }
function updateRangeDisplay(){
  const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById('range-display').textContent =
    rangeFrom && rangeTo ? `${fmt(rangeFrom)} 〜 ${fmt(rangeTo)}` : '-- / -- 〜 -- / --';
}

/* ══ カスタムカレンダー ══ */
let calYear, calMonth;
let calSelStart = null, calSelEnd = null;

function openCal(){
  const now = new Date();
  calYear  = rangeFrom ? rangeFrom.getFullYear() : now.getFullYear();
  calMonth = rangeFrom ? rangeFrom.getMonth()    : now.getMonth();
  calSelStart = rangeFrom ? new Date(rangeFrom) : null;
  calSelEnd   = rangeTo   ? new Date(rangeTo)   : null;
  renderCalGrid();
  document.getElementById('cal-popup').classList.add('show');
  document.getElementById('cal-overlay').classList.add('show');
}
function closeCal(){
  document.getElementById('cal-popup').classList.remove('show');
  document.getElementById('cal-overlay').classList.remove('show');
}
function confirmCal(){
  if(!calSelStart || !calSelEnd) return;
  rangeFrom = new Date(calSelStart);
  rangeTo   = new Date(calSelEnd);
  updateRangeDisplay();
  closeCal();
}
function calMove(dir){
  calMonth += dir;
  if(calMonth > 11){ calMonth=0; calYear++; }
  if(calMonth < 0 ){ calMonth=11; calYear--; }
  renderCalGrid();
}

function isSameDay(a,b){ return a&&b&&a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate(); }
function dateOnly(d){ return new Date(d.getFullYear(),d.getMonth(),d.getDate()); }

function renderCalGrid(){
  const months=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  document.getElementById('cal-title').textContent = `${calYear}年 ${months[calMonth]}`;

  const today = dateOnly(new Date());
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  const prevDays = new Date(calYear, calMonth, 0).getDate();

  let html = '';
  // 前月の日
  for(let i=0; i<firstDay; i++){
    const d = new Date(calYear, calMonth-1, prevDays - firstDay + i + 1);
    html += calDayHTML(d, true);
  }
  // 今月の日
  for(let i=1; i<=daysInMonth; i++){
    const d = new Date(calYear, calMonth, i);
    html += calDayHTML(d, false);
  }
  // 次月の日（6行分埋める）
  const total = firstDay + daysInMonth;
  const remain = total % 7 === 0 ? 0 : 7 - (total % 7);
  for(let i=1; i<=remain; i++){
    const d = new Date(calYear, calMonth+1, i);
    html += calDayHTML(d, true);
  }

  document.getElementById('cal-days').innerHTML = html;

  // hint & ok button
  const ok = document.getElementById('cal-ok');
  if(!calSelStart){
    document.getElementById('cal-hint').textContent = '開始日をタップ';
    ok.disabled = true;
  } else if(!calSelEnd){
    document.getElementById('cal-hint').textContent = '終了日をタップ';
    ok.disabled = true;
  } else {
    const fmt = d => `${d.getMonth()+1}/${d.getDate()}`;
    document.getElementById('cal-hint').textContent = `${fmt(calSelStart)} 〜 ${fmt(calSelEnd)}`;
    ok.disabled = false;
  }
}

function calDayHTML(d, otherMonth){
  const ds = dateOnly(d);
  const today = dateOnly(new Date());
  const isToday = isSameDay(ds, today);
  const isStart = calSelStart && isSameDay(ds, dateOnly(calSelStart));
  const isEnd   = calSelEnd   && isSameDay(ds, dateOnly(calSelEnd));
  const inRange = calSelStart && calSelEnd &&
    ds > dateOnly(calSelStart) && ds < dateOnly(calSelEnd);

  let cls = 'cal-day';
  if(otherMonth) cls += ' other-month';
  if(isToday)    cls += ' today';
  if(isStart)    cls += ' range-start';
  if(isEnd)      cls += ' range-end';
  if(inRange)    cls += ' in-range';

  const iso = `${d.getFullYear()},${d.getMonth()},${d.getDate()}`;
  return `<div class="${cls}" onclick="calClick(${iso})">${d.getDate()}</div>`;
}

function calClick(y,m,day){
  const d = new Date(y,m,day);
  if(!calSelStart || (calSelStart && calSelEnd)){
    // 1回目のクリック：開始日セット
    calSelStart = d; calSelEnd = null;
  } else {
    // 2回目のクリック：終了日セット（開始より前なら入れ替え）
    if(d < calSelStart){ calSelEnd = new Date(calSelStart); calSelStart = d; }
    else { calSelEnd = d; }
  }
  renderCalGrid();
}

/* ══ Google API 初期化 ══ */
function onGapiLoad(){

      if(!apiKey) return;
      await gapi.client.init({

      });

    }
  });
}

function onGisLoad(){ initGis(); }

/* ══ トークン保存・復元 ══ */
function saveToken(token){
  const data = { token, expires: Date.now() + 55*60*1000 }; // 55分で期限切れ扱い
  localStorage.setItem('gapi_token', JSON.stringify(data));
}
function loadToken(){
  try {
    const data = JSON.parse(localStorage.getItem('gapi_token'));
    if(data && data.expires > Date.now()) return data.token;
  } catch(e){}
  return null;
}
function clearToken(){ localStorage.removeItem('gapi_token'); }

function initGis(){
  const clientId = localStorage.getItem('cfg_client_id');
  if(!clientId || !window.google?.accounts) return;
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: clientId,
    scope: [
      'https://www.googleapis.com/auth/calendar.readonly',
      'https://www.googleapis.com/auth/calendar.events'
    ].join(' '),
    callback: async (resp) => {
      if(resp.error){ showToast('認証エラー: ' + resp.error); return; }
      saveToken(resp); // トークンを保存
      gapi.client.setToken(resp);
      if(pendingAction === 'fetch') await doFetch();
      else if(pendingAction === 'register') await doRegisterAll();
      else if(pendingAction === 'offleave') await doOffLeaveSearch();
      else if(pendingAction === 'fixallday') await doFixAllDay();
      else if(pendingAction === 'mergeholiday') await doMergeHolidaySearch();
      pendingAction = null;
    }
  });

  // 保存済みトークンがあれば復元
  const saved = loadToken();
  if(saved){
    gapi.client.setToken(saved);
    updateAuthStatus('ログイン済み ✓');
  } else if(localStorage.getItem('cfg_client_id') && localStorage.getItem('cfg_api_key')){
    // トークン期限切れの場合、ページロード時にサイレント再認証を試みる
    setTimeout(() => {
      if(!loadToken() && tokenClient && isGapiReady){
        pendingAction = null;
        tokenClient.requestAccessToken({ prompt: '' });
      }
    }, 1500);
  }
}

function initGapi(){
  if(window.gapi && !isGapiReady) onGapiLoad();
  if(window.google?.accounts) initGis();
}

/* ══ 認証→処理の共通フロー ══ */
async function withAuth(action){
  if(!localStorage.getItem('cfg_api_key') || !localStorage.getItem('cfg_client_id')){
    showToast('⚙ 設定を開き、APIキーとクライアントIDを入力してください');
    toggleConfig(); return;
  }
  if(!isGapiReady){ showToast('API初期化中です。数秒後に再度お試しください'); return; }
  if(!tokenClient){ initGis(); if(!tokenClient){ showToast('GIS初期化エラー。設定を確認してください'); return; } }

  // 保存済みの有効なトークンがあればそのまま実行
  const saved = loadToken();
  if(saved){
    gapi.client.setToken(saved);
    pendingAction = null;
    if(action === 'fetch') await doFetch();
    else if(action === 'register') await doRegisterAll();
    else if(action === 'offleave') await doOffLeaveSearch();
    else if(action === 'fixallday') await doFixAllDay();
    else if(action === 'mergeholiday') await doMergeHolidaySearch();
    return;
  }

  // トークンなし or 期限切れ → 認証フロー（初回のみ表示、以降はサイレント）
  pendingAction = action;
  tokenClient.requestAccessToken({ prompt: '' });
}

async function doOffLeaveSearch(){
  showToast('OFF・leave予定を検索中...');
  try {
    let calId = localStorage.getItem('cfg_src_cal') || '2フライト';
    if(!calId.includes('@') && calId !== 'primary'){
      const res = await gapi.client.calendar.calendarList.list();
      const found = (res.result.items || []).find(c => c.summary === calId);
      if(found) calId = found.id;
      else { showToast(`カレンダー「${calId}」が見つかりません`); return; }
    }

    const timeMin = rangeFrom ? rangeFrom.toISOString() : new Date(Date.now()-2*24*3600*1000).toISOString();
    const timeMax = rangeTo   ? rangeTo.toISOString()   : new Date(Date.now()+90*24*3600*1000).toISOString();

    // OFF と leave を別々に検索（fullTextは複数語のAND検索のため）
    const [offRes, leaveRes] = await Promise.all([
      gapi.client.calendar.events.list({ calendarId: calId, timeMin, timeMax, q: 'OFF', singleEvents: true, orderBy: 'startTime', maxResults: 100 }),
      gapi.client.calendar.events.list({ calendarId: calId, timeMin, timeMax, q: 'leave', singleEvents: true, orderBy: 'startTime', maxResults: 100 })
    ]);

    const seen = new Set();
    const items = [];
    [...(offRes.result.items||[]), ...(leaveRes.result.items||[])].forEach(item => {
      const title = (item.summary||'');
      if(/off|leave/i.test(title) && !seen.has(item.id)){
        seen.add(item.id);
        items.push({
          id: item.id, summary: item.summary,
          start: item.start.dateTime || item.start.date,
          end: item.end.dateTime || item.end.date,
          isAllDay: !item.start.dateTime,
          description: item.description || '',
          location: item.location || '',
          sourceCalId: calId
        });
      }
    });

    items.sort((a,b) => new Date(a.start) - new Date(b.start));

    // 連続するOFF/leaveをグループ化（前の終了時刻と次の開始時刻が連続している場合まとめる）
    offLeaveCandidates = groupConsecutiveOffLeave(items);
    renderOffLeavePanel();
  } catch(e){
    const msg = e.result?.error?.message || e.message || JSON.stringify(e);
    showToast('検索失敗: ' + msg);
    console.error(e);
  }
}

// 隣接するOFF/leave予定をグループ化する
// 「前の予定の終了UTC」と「次の予定の開始UTC」の差が許容範囲内（同日〜1分程度の隙間）なら連続とみなす
function groupConsecutiveOffLeave(items){
  if(items.length === 0) return [];
  const groups = [];
  let current = [items[0]];

  for(let i=1; i<items.length; i++){
    const prevEnd = new Date(current[current.length-1].end);
    const curStart = new Date(items[i].start);
    const gapMs = curStart.getTime() - prevEnd.getTime();
    // 隙間が2時間以内なら連続とみなす（Off終了14:59→翌Off開始15:00のような1分の隙間を吸収）
    if(gapMs >= 0 && gapMs <= 2*3600000){
      current.push(items[i]);
    } else {
      groups.push(current);
      current = [items[i]];
    }
  }
  groups.push(current);

  // グループを1件分のオブジェクトに変換
  return groups.map(group => {
    const first = group[0], last = group[group.length-1];
    const summaries = [...new Set(group.map(g => g.summary))];
    return {
      ids: group.map(g => g.id),
      summary: summaries.join(' / '),
      start: first.start,
      end: last.end,
      isAllDay: first.isAllDay,
      description: group.map(g => g.description).filter(Boolean).join('\n---\n'),
      location: first.location,
      sourceCalId: first.sourceCalId,
      dayCount: group.length
    };
  });
}

// 「1休日」内の連続終日予定をグループ化して取得（検索のみ、insert/deleteは行わない）
async function findMergeGroups(){
  const timeMin = rangeFrom ? rangeFrom.toISOString() : new Date(Date.now()-2*24*3600*1000).toISOString();
  const timeMax = rangeTo   ? rangeTo.toISOString()   : new Date(Date.now()+90*24*3600*1000).toISOString();

  const res = await gapi.client.calendar.events.list({
    calendarId: OFF_LEAVE_CAL_ID, timeMin, timeMax, singleEvents: true, orderBy: 'startTime', maxResults: 250
  });

  const items = (res.result.items || [])
    .filter(item => !item.start.dateTime && /off|leave|^hh$|vac/i.test(item.summary || ''))
    .map(item => ({
      id: item.id,
      summary: item.summary,
      start: item.start.date,
      end: item.end.date,
      description: item.description || '',
      location: item.location || ''
    }))
    .sort((a,b) => new Date(a.start) - new Date(b.start));

  const groups = [];
  let current = items.length ? [items[0]] : [];
  for(let i=1; i<items.length; i++){
    const prevEnd = current[current.length-1].end;
    if(items[i].start === prevEnd){
      current.push(items[i]);
    } else {
      groups.push(current);
      current = [items[i]];
    }
  }
  if(current.length) groups.push(current);

  return groups.filter(g => g.length > 1).map(g => {
    const summaries = [...new Set(g.map(x => x.summary))];
    return {
      ids: g.map(x => x.id),
      summary: summaries.join(' / '),
      start: g[0].start,
      end: g[g.length-1].end,
      description: g.map(x => x.description).filter(Boolean).join('\n---\n'),
      location: g[0].location,
      dayCount: g.length
    };
  });
}

// 統合グループを実際にinsert/deleteする（UIなし、件数を返す）
async function applyMergeGroups(groups){
  let success = 0, fail = 0, deletedTotal = 0;
  for(const g of groups){
    try {
      const resource = {
        summary: g.summary, description: g.description, location: g.location,
        start: { date: g.start }, end: { date: g.end }
      };
      await gapi.client.calendar.events.insert({ calendarId: OFF_LEAVE_CAL_ID, resource });
      for(const id of g.ids){
        try { await gapi.client.calendar.events.delete({ calendarId: OFF_LEAVE_CAL_ID, eventId: id }); deletedTotal++; }
        catch(de){ console.error('delete error', id, de); }
      }
      success++;
    } catch(e){ console.error(e); fail++; }
  }
  return { success, fail, deletedTotal };
}

// 移動完了後に自動で連続統合を実行（サイレント、UI確認なし）
async function autoMergeAfterMove(){
  try {
    const groups = await findMergeGroups();
    if(groups.length === 0) return { success: 0, fail: 0, deletedTotal: 0 };
    return await applyMergeGroups(groups);
  } catch(e){
    console.error('autoMerge error', e);
    return { success: 0, fail: 0, deletedTotal: 0 };
  }
}

function pad2(n){ return String(n).padStart(2,'0'); }
function ymd(d){ return `${d.getUTCFullYear()}-${pad2(d.getUTCMonth()+1)}-${pad2(d.getUTCDate())}`; }

// 既存の開始・終了（all-day or timed）から、終日イベント用の date 文字列範囲を算出
// Google Calendarの終日イベントの end.date は「排他的」(実際の最終日+1日)
// 時刻付き(dateTime)の場合は UTC→JST(+9h) 変換した上で日付を確定する
// (例: UTC 15:00開始 → JST 翌日00:00 となるため、開始日はUTC日付の+1日)
// 複数日にまたがるグループの場合、endStrのJST変換結果が実際の最終日を示す
function toAllDayRange(startStr, endStr, wasAllDay){
  if(wasAllDay){
    return { startDate: startStr.slice(0,10), endDate: endStr.slice(0,10) };
  }
  const sJST = new Date(new Date(startStr).getTime() + 9*3600000);
  const eJST = new Date(new Date(endStr).getTime()   + 9*3600000);

  const startDate = ymd(sJST);

  // 終了側：UTC 14:59 のようにJST変換すると 23:59 になる（同日扱い）→ +1日して排他的end.dateにする
  // UTC 15:00以降だとJST翌日00:00になり、すでに次の日扱いなのでそのままend.dateとして使う
  const eDateOnly = new Date(Date.UTC(eJST.getUTCFullYear(), eJST.getUTCMonth(), eJST.getUTCDate()));
  const eHasTime = (eJST.getUTCHours() !== 0 || eJST.getUTCMinutes() !== 0);
  const endBase = eHasTime ? new Date(eDateOnly.getTime() + 24*3600000) : eDateOnly;

  const endDate = ymd(endBase);
  return { startDate, endDate };
}

/* ══ 「1休日」「2フライト」内のOFF・leave・STANDBY(FO R)を終日修正 ══ */
function startFixAllDay(){ withAuth('fixallday'); }

async function doFixAllDay(){
  showToast('OFF・leave・STANDBY(FO R)予定を確認中...');
  let success = 0, fail = 0;

  try {
    const timeMin = rangeFrom ? rangeFrom.toISOString() : new Date(Date.now()-2*24*3600*1000).toISOString();
    const timeMax = rangeTo   ? rangeTo.toISOString()   : new Date(Date.now()+90*24*3600*1000).toISOString();

    /* ── 1) 「1休日」内のOFF・leave ── */
    const res1 = await gapi.client.calendar.events.list({
      calendarId: OFF_LEAVE_CAL_ID, timeMin, timeMax, singleEvents: true, orderBy: 'startTime', maxResults: 250
    });
    const offLeaveItems = (res1.result.items || []).filter(item => {
      const isTimed = !!item.start.dateTime;
      return isTimed && /off|leave/i.test(item.summary || '');
    });
    for(const item of offLeaveItems){
      try {
        const { startDate, endDate } = toAllDayRange(item.start.dateTime, item.end.dateTime, false);
        const resource = {
          summary: item.summary, description: item.description || '', location: item.location || '',
          start: { date: startDate }, end: { date: endDate }
        };
        await gapi.client.request({
          path: `/calendar/v3/calendars/${encodeURIComponent(OFF_LEAVE_CAL_ID)}/events/${item.id}`,
          method: 'PUT', body: resource
        });
        success++;
      } catch(e){ console.error('Fix error (1休日)', item.id, e.result?.error || e); fail++; }
    }

    /* ── 2) 「2フライト」内のSTANDBY(FO R) ── */
    let calId = localStorage.getItem('cfg_src_cal') || '2フライト';
    if(!calId.includes('@') && calId !== 'primary'){
      const cl = await gapi.client.calendar.calendarList.list();
      const found = (cl.result.items || []).find(c => c.summary === calId);
      if(found) calId = found.id;
      else calId = null;
    }
    if(calId){
      const res2 = await gapi.client.calendar.events.list({
        calendarId: calId, timeMin, timeMax, singleEvents: true, orderBy: 'startTime', maxResults: 250
      });
      const standbyItems = (res2.result.items || []).filter(item => {
        const isTimed = !!item.start.dateTime;
        const isStandby = /standby/i.test(item.summary || '');
        const hasFOR = /FO\s*R\b/i.test(item.description || '');
        return isTimed && isStandby && hasFOR;
      });
      for(const item of standbyItems){
        try {
          const startUTC = new Date(item.start.dateTime);
          const jstStart = new Date(startUTC.getTime() + 9*3600000);
          const startDate = ymd(jstStart);
          const next = new Date(jstStart); next.setUTCDate(next.getUTCDate()+1);
          const endDate = ymd(next);
          const resource = {
            summary: item.summary, description: item.description || '', location: item.location || '',
            start: { date: startDate }, end: { date: endDate }
          };
          await gapi.client.request({
            path: `/calendar/v3/calendars/${encodeURIComponent(calId)}/events/${item.id}`,
            method: 'PUT', body: resource
          });
          success++;
        } catch(e){ console.error('Fix error (2フライト)', item.id, e.result?.error || e); fail++; }
      }
    }

    if(success === 0 && fail === 0){
      showToast('終日に修正が必要な予定はありませんでした');
    } else {
      showToast(`${success}件を終日に修正しました${fail>0?`（失敗:${fail}件）`:''} ✓`);
    }
  } catch(e){
    const msg = e.result?.error?.message || e.message || JSON.stringify(e);
    showToast('修正失敗: ' + msg);
    console.error(e);
  }
}


async function confirmOffLeaveMigration(){
  const selected = offLeaveCandidates.filter((_,i) => document.getElementById(`ol_${i}`)?.checked);
  if(selected.length === 0){ showToast('選択された予定がありません'); return; }

  const btn = document.getElementById('offleave-confirm-btn');
  btn.disabled = true; btn.textContent = '移動中...';

  let success = 0, fail = 0, deletedTotal = 0;
  for(const ev of selected){
    try {
      // 1休日カレンダーに新規作成（常に終日イベントとして登録、複数日連続OFFは1つの期間イベントにまとめる）
      const resource = {
        summary: ev.summary,
        description: ev.description,
        location: ev.location
      };
      const { startDate, endDate } = toAllDayRange(ev.start, ev.end, ev.isAllDay);
      resource.start = { date: startDate };
      resource.end   = { date: endDate };

      await gapi.client.calendar.events.insert({ calendarId: OFF_LEAVE_CAL_ID, resource });

      // グループ内の元イベントを全て削除
      const idsToDelete = ev.ids || [ev.id];
      for(const id of idsToDelete){
        try {
          await gapi.client.calendar.events.delete({ calendarId: ev.sourceCalId, eventId: id });
          deletedTotal++;
        } catch(de){ console.error('delete error', id, de); }
      }
      success++;
    } catch(e){
      console.error(e);
      fail++;
    }
  }

  btn.disabled = false; btn.textContent = 'この内容で移動する';
  closeOffLeavePanel();
  showToast(`${success}件（元${deletedTotal}件）を「1休日」へ移動しました ✓ 連続統合を確認中...`);

  // 移動完了後、「1休日」内の連続予定を自動で統合する
  const mergeResult = await autoMergeAfterMove();
  if(mergeResult.success > 0){
    showToast(`さらに${mergeResult.success}件のグループ（元${mergeResult.deletedTotal}件）を自動統合しました ✓`);
  } else if(fail === 0){
    showToast(`${success}件を「1休日」へ移動しました ✓`);
  }
}

async function doFetch(){
  showToast('カレンダーを取得中...');
  try {
    let calId = localStorage.getItem('cfg_src_cal') || '2フライト';

    // カレンダー名からIDを解決
    if(!calId.includes('@') && calId !== 'primary'){
      const res = await gapi.client.calendar.calendarList.list();
      const found = (res.result.items || []).find(c => c.summary === calId);
      if(found){ calId = found.id; }
      else { showToast(`カレンダー「${calId}」が見つかりません`); return; }
    }

    const timeMin = rangeFrom ? rangeFrom.toISOString() : new Date(Date.now()-2*24*3600*1000).toISOString();
    const timeMax = rangeTo   ? rangeTo.toISOString()   : new Date(Date.now()+90*24*3600*1000).toISOString();

    const res = await gapi.client.calendar.events.list({
      calendarId: calId, timeMin, timeMax, singleEvents: true, orderBy: 'startTime', maxResults: 100
    });

    const items = res.result.items || [];
    EVENTS = items
      .filter(item => {
        const t = (item.summary||'') + (item.description||'');
        return /Check-in|Hotel|FO|DEADHEAD/i.test(t);
      })
      .map(item => ({
        id: item.id,
        summary: item.summary || 'フライトスケジュール',
        start: item.start.dateTime || item.start.date,
        desc: item.description || ''
      }));

    render();
    showToast(`同期完了：${EVENTS.length}件取得`);
  } catch(e){
    const msg = e.result?.error?.message || e.message || JSON.stringify(e);
    if(e.result?.error?.code === 401){ clearToken(); updateAuthStatus(); showToast('再ログインが必要です。もう一度タップしてください'); }
    else showToast('取得失敗: ' + msg);
    console.error(e);
  }
}

/* ══ パーサー ══ */
const FL_RE   = /^(\d{1,4})\s+(\d{2}:\d{2})\s+(\d{2}:\d{2})\s+([A-Z]{3})\s*[-–]\s*([A-Z]{3})\s+(FO|DEADHEAD|OBS)/;
const DATE_RE = /^(?:Mon|Tue|Wed|Thu|Fri|Sat|Sun),\s+(\d+)\s+(\w+)\s+(\d{4})/i;
const MONTHS  = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};

function parseFlightsWithDate(desc){
  const lines=desc.split('\n').map(l=>l.trim()).filter(Boolean);
  const result=[]; let cur=null;
  for(const l of lines){
    const dm=l.match(DATE_RE); if(dm){cur=new Date(Date.UTC(+dm[3],MONTHS[dm[2].toLowerCase()],+dm[1]));continue;}
    const m=l.match(FL_RE); if(m&&cur) result.push({num:m[1],dep:m[2],arr:m[3],from:m[4],to:m[5],role:m[6],date:new Date(cur)});
  }
  return result;
}

function parseStayPairs(desc){
  const lines=desc.split('\n').map(l=>l.trim()).filter(Boolean);
  let cur=null; const tagged=[];
  for(const l of lines){
    const dm=l.match(DATE_RE); if(dm){cur=new Date(Date.UTC(+dm[3],MONTHS[dm[2].toLowerCase()],+dm[1]));continue;}
    if(/^Hotel\s/i.test(l)){tagged.push({type:'hotel'});continue;}
    const tm=l.match(/^Transport\s+(\d{2}:\d{2})/i); if(tm){tagged.push({type:'transport',time:tm[1],date:cur?new Date(cur):null});continue;}
    const cm=l.match(/^Check-in\s+(\d{2}:\d{2})\s+([A-Z]{3})/i); if(cm){tagged.push({type:'checkin',time:cm[1],airport:cm[2],date:cur?new Date(cur):null});continue;}
    const m=l.match(FL_RE); if(m&&cur) tagged.push({type:'flight',num:m[1],dep:m[2],arr:m[3],from:m[4],to:m[5],role:m[6],date:new Date(cur)});
  }
  const pairs=[];
  for(let i=0;i<tagged.length;i++){
    if(tagged[i].type!=='hotel') continue;
    let fo=null;
    for(let j=i+1;j<tagged.length;j++){ if(tagged[j].type==='flight'){ if(tagged[j].role==='DEADHEAD') continue; fo=tagged[j]; break; } }
    if(!fo) continue;
    let pickup=null; for(let j=i+1;j<tagged.length;j++){ if(tagged[j].type==='transport'){pickup=tagged[j];break;} if(tagged[j].type==='flight') break; }
    let showup=null; for(let j=i+1;j<tagged.length;j++){ if(tagged[j].type==='checkin') showup=tagged[j]; if(tagged[j].type==='flight'&&tagged[j].num===fo.num) break; }
    pairs.push({...fo,pickup,showup});
  }
  return pairs;
}

function hasHotel(desc){ return /Hotel\s/i.test(desc); }

function calcDepUTC(evStart, hhmm, airport, flightDate){
  const [hh,mm]=hhmm.split(':').map(Number);
  if(flightDate){ const t=new Date(flightDate); t.setUTCHours(hh,mm,0,0); return t; }
  const base=new Date(evStart);
  for(let d=-1;d<6;d++){ const t=new Date(base); t.setUTCDate(t.getUTCDate()+d); t.setUTCHours(hh,mm,0,0); if(t>=base) return t; }
  return null;
}
function toHHMM(d,off){ const l=new Date(d.getTime()+off*3600000); return String(l.getUTCHours()).padStart(2,'0')+String(l.getUTCMinutes()).padStart(2,'0'); }
function toDateStr(d,off){ const l=new Date(d.getTime()+off*3600000); return `${l.getUTCMonth()+1}/${l.getUTCDate()} ${String(l.getUTCHours()).padStart(2,'0')}:${String(l.getUTCMinutes()).padStart(2,'0')}`; }
function toISO(d){ return d.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z'; }

/* ══ カード描画 ══ */
function findHotelInsertIdx(desc, flights){
  const lines=desc.split('\n').map(l=>l.trim()).filter(Boolean);
  const seq=[]; let fi=0;
  for(const l of lines){
    if(l.match(DATE_RE)) continue;
    if(/^Hotel\s/i.test(l)){seq.push({type:'hotel'});continue;}
    if(l.match(FL_RE)){seq.push({type:'flight',idx:fi});fi++;}
  }
  const ins=new Set();
  for(let i=0;i<seq.length;i++){
    if(seq[i].type!=='hotel') continue;
    for(let j=i+1;j<seq.length;j++){ if(seq[j].type==='flight'){ins.add(seq[j].idx);break;} }
  }
  return ins;
}

function buildCard(ev){
  const flights=parseFlightsWithDate(ev.desc);
  const pairs=parseStayPairs(ev.desc);
  const isPairs=pairs.length>0;
  const stayNums=new Set(pairs.map(p=>p.num));
  const badgeCls=isPairs?'b-stay':(flights.length?'b-fly':'b-other');
  const badgeTxt=isPairs?'STAY':'FLY';
  const startD=new Date(ev.start);
  const dateLabel=`${startD.getUTCMonth()+1}/${startD.getUTCDate()}`;

  const hotelIns=findHotelInsertIdx(ev.desc,flights);
  let tlHTML='';
  flights.forEach((f,idx)=>{
    if(hotelIns.has(idx)) tlHTML+=`<div class="tl-item stay-item"><span>🛏 ホテルステイ</span></div>`;
    const after=hotelIns.has(idx)&&stayNums.has(f.num);
    tlHTML+=`<div class="tl-item fl">
      <span class="tl-time">${f.dep}–${f.arr}</span>
      <span style="color:var(--text)">JL${f.num}</span>
      <span style="font-size:11px;color:var(--text2)">${f.from}→${f.to}</span>
      <span class="role-tag ${f.role==='FO'?'role-fo':'role-dh'}">${f.role}</span>
      ${after?'<span class="after-stay-tag">★ステイ後</span>':''}
    </div>`;
  });

  const alertHTML=pairs.map(p=>{
    const depUTC=calcDepUTC(ev.start,p.dep,p.from,p.date); if(!depUTC) return '';
    const off=tzOff(p.from);
    const a18=new Date(depUTC.getTime()-18*3600000);
    const a8 =new Date(depUTC.getTime()-8 *3600000);
    const sL=toHHMM(a18,off), eL=toHHMM(a8,off);
    const tsuikenSummary=`追検 ${sL}L-${eL}L`;
    const key=`${ev.id}_${p.num}`, done=!!registered[key];

    let pickupL=null, showupL=null, idoSummary=null;
    if(p.pickup?.time){ const pt=calcDepUTC(ev.start,p.pickup.time,p.from,p.pickup.date); if(pt) pickupL=toHHMM(pt,off); }
    if(p.showup?.time){ const so=tzOff(p.showup.airport||p.from); const st=calcDepUTC(ev.start,p.showup.time,p.showup.airport||p.from,p.showup.date); if(st) showupL=toHHMM(st,so); }
    if(pickupL||showupL) idoSummary=[pickupL?`P${pickupL}L`:'',showupL?`S${showupL}L`:''].filter(Boolean).join(' ');
    const idoKey=`${ev.id}_ido_${p.num}`, idoDone=!!registered[idoKey];

    return `
    <div class="dep-box">
      <div class="dep-box-label">▶ ステイ後の便</div>
      <div class="dep-flight">JL${p.num} ${p.from} → ${p.to}</div>
      <div class="dep-sub">出発 ${p.dep} UTC（${p.from} / UTC${off>=0?'+':''}${off}）</div>
    </div>
    <div class="alert-box">
      <div class="alert-box-title">⏰ 追検時間帯</div>
      <div class="alert-row"><span class="alert-lbl">18h前（開始）</span><span class="alert-val">${toDateStr(a18,off)} L<br>${a18.toISOString().slice(5,16).replace('T',' ')} UTC</span></div>
      <div class="alert-row"><span class="alert-lbl">8h前（終了）</span><span class="alert-val">${toDateStr(a8,off)} L<br>${a8.toISOString().slice(5,16).replace('T',' ')} UTC</span></div>
      <div class="summary-row"><span class="summary-label">件名</span><span class="summary-value">${tsuikenSummary}</span></div>
    </div>
    <button class="reg-btn${done?' done':''}" id="btn_${key}" onclick="regSingle('${key}','${ev.id}','${p.num}','${p.from}','${ev.start}','${p.dep}','${p.date?p.date.toISOString():''}')">
      ${done?`✓ 登録済み`:`📅 追検を登録`}
    </button>
    ${idoSummary?`
    <div class="alert-box" style="border-color:rgba(245,166,35,0.25);margin-top:8px">
      <div class="alert-box-title" style="color:var(--amber)">🚗 移動情報</div>
      <div class="summary-row"><span class="summary-label">件名</span><span class="summary-value" style="color:var(--amber)">${idoSummary}</span></div>
    </div>
    <button class="reg-btn${idoDone?' done':''}" id="btn_${idoKey}" style="${idoDone?'':'color:var(--amber);background:rgba(245,166,35,0.12);border-color:rgba(245,166,35,0.3)'}"
      onclick="regIdoSingle('${idoKey}','${ev.id}','${p.num}','${p.from}','${p.showup?.airport||p.from}','${ev.start}','${p.dep}','${p.date?p.date.toISOString():''}','${p.pickup?.time||''}','${p.pickup?.date?p.pickup.date.toISOString():''}','${p.showup?.time||''}','${p.showup?.date?p.showup.date.toISOString():''}')">
      ${idoDone?`✓ 移動登録済み`:`🚗 移動を登録`}
    </button>`:''}`;
  }).join('');

  // 一括登録用データ
  const bulkData=pairs.map(p=>{
    const depUTC=calcDepUTC(ev.start,p.dep,p.from,p.date); if(!depUTC) return null;
    const off=tzOff(p.from);
    const a18=new Date(depUTC.getTime()-18*3600000), a8=new Date(depUTC.getTime()-8*3600000);
    let pickupL=null, showupL=null, idoSummary=null;
    if(p.pickup?.time){ const pt=calcDepUTC(ev.start,p.pickup.time,p.from,p.pickup.date); if(pt) pickupL=toHHMM(pt,off); }
    if(p.showup?.time){ const so=tzOff(p.showup.airport||p.from); const st=calcDepUTC(ev.start,p.showup.time,p.showup.airport||p.from,p.showup.date); if(st) showupL=toHHMM(st,so); }
    if(pickupL||showupL) idoSummary=[pickupL?`P${pickupL}L`:'',showupL?`S${showupL}L`:''].filter(Boolean).join(' ');
    return {
      tsuikenKey:`${ev.id}_${p.num}`, tsuikenSummary:`追検 ${toHHMM(a18,off)}L-${toHHMM(a8,off)}L`,
      start18:a18.toISOString(), end8:a8.toISOString(),
      idoKey:`${ev.id}_ido_${p.num}`, idoSummary, depISO:depUTC.toISOString()
    };
  }).filter(Boolean);

  const allDone=bulkData.length>0&&bulkData.every(d=>registered[d.tsuikenKey]&&(!d.idoSummary||registered[d.idoKey]));
  const cardAttr=encodeURIComponent(JSON.stringify(bulkData));

  return `<article class="ev-card${isPairs?' has-alert':''}" id="card_${ev.id}" data-bulk="${cardAttr}">
    <div class="ev-header">
      ${isPairs&&!allDone?`<input type="checkbox" class="card-checkbox" id="chk_${ev.id}" onchange="onCheckChange(this,'${ev.id}')" onclick="event.stopPropagation()">`:`<span style="width:20px;flex-shrink:0"></span>`}
      <span class="ev-date-left" onclick="toggleBody('${ev.id}')" style="cursor:pointer">${dateLabel}</span>
      <span class="badge ${badgeCls}" onclick="toggleBody('${ev.id}')" style="cursor:pointer">${badgeTxt}</span>
      <span style="flex:1" onclick="toggleBody('${ev.id}')"></span>
      <span class="ev-name" onclick="toggleBody('${ev.id}')" style="cursor:pointer">${ev.summary}</span>
      <span class="chev" id="chev_${ev.id}" onclick="toggleBody('${ev.id}')" style="cursor:pointer">▾</span>
    </div>
    <div class="ev-body" id="body_${ev.id}">
      <div class="sec-lbl">フライト</div>
      <div class="timeline">${tlHTML}</div>
      ${alertHTML}
    </div>
  </article>`;
}

function toggleBody(id){
  document.getElementById(`body_${id}`).classList.toggle('open');
  document.getElementById(`chev_${id}`).classList.toggle('open');
}

function setTab(t,el){ currentTab=t; document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active')); el.classList.add('active'); render(); }

function render(){
  let evs=EVENTS;
  if(currentTab==='stay') evs=EVENTS.filter(e=>hasHotel(e.desc));
  document.getElementById('container').innerHTML=evs.length?evs.map(buildCard).join(''):'<div class="empty">該当するスケジュールがありません</div>';
}

/* ══ 個別登録（追検） ══ */
async function regSingle(key,evId,flNum,depAirport,evStart,depHHMM,flightDateISO){
  const flightDate=flightDateISO?new Date(flightDateISO):null;
  const depUTC=calcDepUTC(evStart,depHHMM,depAirport,flightDate); if(!depUTC) return;
  const off=tzOff(depAirport);
  const a18=new Date(depUTC.getTime()-18*3600000), a8=new Date(depUTC.getTime()-8*3600000);
  const summary=`追検 ${toHHMM(a18,off)}L-${toHHMM(a8,off)}L`;
  await insertEvent(TARGET_CAL_ID,summary,a18.toISOString(),a8.toISOString());
  registered[key]=true;
  const btn=document.getElementById(`btn_${key}`);
  if(btn){btn.classList.add('done');btn.textContent=`✓ 登録済み`;}
  showToast(`「${summary}」を登録しました ✓`);
}

/* ══ 個別登録（移動） ══ */
async function regIdoSingle(key,evId,flNum,depAirport,showupAirport,evStart,depHHMM,flightDateISO,pickupHHMM,pickupDateISO,showupHHMM,showupDateISO){
  const flDate=flightDateISO?new Date(flightDateISO):null;
  const depUTC=calcDepUTC(evStart,depHHMM,depAirport,flDate); if(!depUTC) return;
  const off=tzOff(depAirport), soOff=tzOff(showupAirport);
  let pL=null,sL=null;
  if(pickupHHMM){ const pt=calcDepUTC(evStart,pickupHHMM,depAirport,pickupDateISO?new Date(pickupDateISO):null); if(pt) pL=toHHMM(pt,off); }
  if(showupHHMM){ const st=calcDepUTC(evStart,showupHHMM,showupAirport,showupDateISO?new Date(showupDateISO):null); if(st) sL=toHHMM(st,soOff); }
  const summary=[pL?`P${pL}L`:'',sL?`S${sL}L`:''].filter(Boolean).join(' ');
  if(!summary) return;
  const endISO=new Date(depUTC.getTime()+3600000).toISOString();
  await insertEvent(IDO_CAL_ID,summary,depUTC.toISOString(),endISO);
  registered[key]=true;
  const btn=document.getElementById(`btn_${key}`);
  if(btn){btn.classList.add('done');btn.style='';btn.textContent=`✓ 移動登録済み`;}
  showToast(`「${summary}」を登録しました ✓`);
}

/* ══ カレンダーAPI挿入 ══ */
async function insertEvent(calendarId,summary,startISO,endISO){
  await gapi.client.calendar.events.insert({
    calendarId,
    resource:{ summary, start:{dateTime:startISO,timeZone:'UTC'}, end:{dateTime:endISO,timeZone:'UTC'} }
  });
}

/* ══ 一括登録 ══ */
function onCheckChange(chk,evId){ if(chk.checked) selectedIds.add(evId); else selectedIds.delete(evId); updateBulkBar(); }
function updateBulkBar(){ const bar=document.getElementById('bulk-bar'); document.getElementById('bulk-bar-count').textContent=`${selectedIds.size}件選択中`; selectedIds.size>0?bar.classList.add('show'):bar.classList.remove('show'); }
function clearSelection(){ selectedIds.forEach(id=>{const c=document.getElementById(`chk_${id}`);if(c)c.checked=false;}); selectedIds.clear(); updateBulkBar(); }

async function execBulkRegister(){
  if(!gapi.client.getToken()){ showToast('再認証が必要です。自動取得ボタンを押してください'); return; }
  showToast('一括登録中...');
  let count=0;
  for(const evId of selectedIds){
    const card=document.getElementById(`card_${evId}`); if(!card) continue;
    const bulkData=JSON.parse(decodeURIComponent(card.dataset.bulk));
    for(const d of bulkData){
      try{
        if(!registered[d.tsuikenKey]){
          await insertEvent(TARGET_CAL_ID,d.tsuikenSummary,d.start18,d.end8);
          registered[d.tsuikenKey]=true; count++;
          const b=document.getElementById(`btn_${d.tsuikenKey}`); if(b){b.classList.add('done');b.textContent='✓ 登録済み';}
        }
        if(d.idoSummary&&!registered[d.idoKey]){
          const endISO=new Date(new Date(d.depISO).getTime()+3600000).toISOString();
          await insertEvent(IDO_CAL_ID,d.idoSummary,d.depISO,endISO);
          registered[d.idoKey]=true; count++;
          const b=document.getElementById(`btn_${d.idoKey}`); if(b){b.classList.add('done');b.style='';b.textContent='✓ 移動登録済み';}
        }
      }catch(e){ console.error(e); showToast('一部登録失敗: '+( e.result?.error?.message||e.message)); }
    }
  }
  clearSelection();
  showToast(`${count}件をカレンダーに登録しました ✓`);
}

/* ══ Toast ══ */
function showToast(msg,dur=3500){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),dur);
}

  navigator.serviceWorker.getRegistrations().then(r=>r.forEach(s=>s.unregister()));
  caches.keys().then(keys=>keys.forEach(k=>caches.delete(k)));
}
